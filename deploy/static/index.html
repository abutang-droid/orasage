<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OraSage — 命理与能量</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0e17; color: #fffffe; min-height: 100vh; }
    header { padding: 2rem; text-align: center; }
    h1 { font-size: 2.5rem; letter-spacing: 0.1em; }
    p.sub { color: #a7a9be; margin-top: 0.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    a.card { display: block; background: #1a1928; border: 1px solid #2e2d42; border-radius: 12px; padding: 2rem; text-decoration: none; color: inherit; transition: border-color 0.2s; }
    a.card:hover { border-color: #7f5af0; }
    a.card h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    a.card span { color: #a7a9be; font-size: 0.9rem; }
    footer { text-align: center; padding: 2rem; color: #555; font-size: 0.85rem; }
  </style>
</head>
<body>
  <header>
    <h1>OraSage</h1>
    <p class="sub">八字 · 紫微 · 塔罗 — 探索命运，平衡能量</p>
  </header>
  <div class="grid">
    <a class="card" href="https://bazi.orasage.com"><h2>八字排盘</h2><span>五行旺衰 · 命理分析</span></a>
    <a class="card" href="https://ziwei.orasage.com"><h2>紫微斗数</h2><span>十二宫位 · 星曜解读</span></a>
    <a class="card" href="https://tarot.orasage.com"><h2>塔罗占卜</h2><span>今日能量 · 深度解读</span></a>
    <a class="card" href="https://auth.orasage.com/login"><h2>用户中心</h2><span>登录 / 注册</span></a>
  </div>
  <footer>© 2026 OraSage</footer>
</body>
</html>
