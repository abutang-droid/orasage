# 临时 HTTP 配置 — 仅用于 certbot 申请证书（oricosmos 并行环境）
# 证书申请完成后替换为 oricosmos.conf

server {
    listen 80;
    listen [::]:80;
    server_name
        oricosmos.com
        www.oricosmos.com
        auth.oricosmos.com
        shop.oricosmos.com
        admin.oricosmos.com
        bazi.oricosmos.com
        ziwei.oricosmos.com
        tarot.oricosmos.com
        cms.oricosmos.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 200 'oricosmos bootstrap';
        add_header Content-Type text/plain;
    }
}
