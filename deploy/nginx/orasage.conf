# OraSage — 方案 B 子域名 Nginx 配置（唯一可信源）
# VPS: 34.75.40.67
# 部署: sudo cp orasage.conf /etc/nginx/sites-available/orasage
#       sudo ln -sf /etc/nginx/sites-available/orasage /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 端口约定（各子域固定反代到本机对应端口，全部通过 deploy/ 下脚本部署到本 VPS）:
#   orasage.com   → 3100  main   (Next.js，本地自托管)
#   auth.orasage.com  → 3101  auth   (Express，本地自托管)
#   shop.orasage.com  → 3102  shop   (Next.js，本地自托管)
#   admin.orasage.com → 3103  admin  (Next.js，本地自托管)
#   bazi.orasage.com  → 3110  bazi   (迁移期：Node 反代到现有线上服务；见 deploy/bazi/)
#   ziwei.orasage.com → 3111  ziwei  (迁移期：Node 反代到现有线上服务；见 deploy/ziwei/)
#   tarot.orasage.com → 3112  tarot  (迁移期：Node 反代到现有线上服务；见 deploy/tarot/)
#   cms.orasage.com   → 403    公网封禁（方案 B）
#   admin.orasage.com/cms/* → 3120  CMS 管理入口（内网反代）
#
# 若使用逐个域名证书（非通配符），将下方 ssl_certificate 路径替换为各子域对应路径。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS 全局重定向（含 ACME challenge 例外） ─────────

server {
    listen 80;
    listen [::]:80;
    server_name
        orasage.com
        www.orasage.com
        auth.orasage.com
        shop.orasage.com
        admin.orasage.com
        bazi.orasage.com
        ziwei.orasage.com
        tarot.orasage.com
        cms.orasage.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── www → 根域 ───────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    return 301 https://orasage.com$request_uri;
}

# ── 主门户 orasage.com :3100 ─────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }
}

# ── 认证中心 auth.orasage.com :3101 ──────────────────────────
# /internal/* 已由应用层 IP 校验保护（仅 127.0.0.1），此处再加一层防御

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    location /internal/ {
        deny all;
    }

    location / {
        proxy_pass http://127.0.0.1:3101;
        include /etc/nginx/proxy_params;
    }
}

# ── 商城 shop.orasage.com :3102 ──────────────────────────────
# POST /api/checkout 为内网结账接口，公网只允许 GET/PUT（前台购买）

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shop.orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    location = /api/checkout {
        limit_except GET PUT {
            deny all;
        }
        proxy_pass http://127.0.0.1:3102;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:3102;
        include /etc/nginx/proxy_params;
    }
}

# ── 管理后台 admin.orasage.com :3103 + CMS /cms/* :3120 ─────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    # Payload CMS（方案 B：仅经 admin 子路径访问，公网 cms 子域已封禁）
    location /cms/ {
        proxy_pass http://127.0.0.1:3120/cms/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:3103;
        include /etc/nginx/proxy_params;
    }
}

# ── 八字 bazi.orasage.com :3110 ──────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bazi.orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3110;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }
}

# ── 紫微 ziwei.orasage.com :3111 ─────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ziwei.orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    # report-job 运行时写入 HTML；直连磁盘避免 Next 需重启才暴露 public/reports
    location /reports/ {
        alias /opt/orasage/ziwei/public/reports/;
        default_type text/html;
        charset utf-8;
    }

    location / {
        proxy_pass http://127.0.0.1:3111;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }
}

# ── 塔罗 tarot.orasage.com :3112 ────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tarot.orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3112;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }
}

# ── CMS cms.orasage.com — 方案 B 公网封禁 ───────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cms.orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    location / {
        return 403;
    }
}
