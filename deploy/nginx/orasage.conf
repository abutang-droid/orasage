# OraSage — 方案 B 子域名 Nginx 配置
# VPS: 34.75.40.67
# 部署: sudo cp orasage.conf /etc/nginx/sites-available/orasage
#       sudo ln -sf /etc/nginx/sites-available/orasage /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

# ── 共享 SSL 路径（通配符证书） ──────────────────────────────
# 若使用逐个域名证书，替换为各子域对应路径

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS 全局重定向 ──────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name
        orasage.com
        www.orasage.com
        auth.orasage.com
        shop.orasage.com
        admin.orasage.com
        bazi.orasage.com
        ziwei.orasage.com
        tarot.orasage.com
        cms.orasage.com;
    return 301 https://$host$request_uri;
}

# ── www → 根域 ───────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    return 301 https://orasage.com$request_uri;
}

# ── 主门户 orasage.com :3100 ─────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orasage.com;

    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        include /etc/nginx/proxy_params;
    }
}

