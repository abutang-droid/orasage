# 临时 HTTP 配置 — 仅用于 certbot 申请证书
# 证书申请完成后替换为 orasage.conf

server {
    listen 80;
    listen [::]:80;
    server_name
        orasage.com
        www.orasage.com
        auth.orasage.com
        shop.orasage.com
        admin.orasage.com
        bazi.orasage.com
        ziwei.orasage.com
        tarot.orasage.com
        cms.orasage.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 200 'orasage bootstrap';
        add_header Content-Type text/plain;
    }
}
