# OriCosmos — 并行环境 Nginx（与 orasage.com 生产并存，勿部署到旧 VPS）
# VPS: 新 Google VM（并行环境，勿覆盖 34.75.40.67）
# 部署: sudo cp oricosmos.conf /etc/nginx/sites-available/oricosmos
#       sudo ln -sf /etc/nginx/sites-available/oricosmos /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 端口约定（各子域固定反代到本机对应端口，全部通过 deploy/ 下脚本部署到本 VPS）:
#   oricosmos.com   → 3100  main   (Next.js，本地自托管)
#   auth.oricosmos.com  → 3101  auth   (Express，本地自托管)
#   shop.oricosmos.com  → 3102  shop   (Next.js，本地自托管)
#   admin.oricosmos.com → 3103  admin  (Next.js，本地自托管)
#   bazi.oricosmos.com  → 3110  bazi   (迁移期：Node 反代到现有线上服务；见 deploy/bazi/)
#   ziwei.oricosmos.com → 3111  ziwei  (迁移期：Node 反代到现有线上服务；见 deploy/ziwei/)
#   tarot.oricosmos.com → 3112  tarot  (迁移期：Node 反代到现有线上服务；见 deploy/tarot/)
#   cms.oricosmos.com   → 301    重定向至 admin（运营后台或 /cms/*）
#   admin.oricosmos.com/cms/* → 3120  CMS 管理入口（内网反代）
#
# 若使用逐个域名证书（非通配符），将下方 ssl_certificate 路径替换为各子域对应路径。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS 全局重定向（含 ACME challenge 例外） ─────────

server {
    listen 80;
    listen [::]:80;
    server_name
        oricosmos.com
        www.oricosmos.com
        auth.oricosmos.com
        shop.oricosmos.com
        admin.oricosmos.com
        bazi.oricosmos.com
        ziwei.oricosmos.com
        tarot.oricosmos.com
        cms.oricosmos.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── www → 根域 ───────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.oricosmos.com;

    ssl_certificate     /etc/letsencrypt/live/oricosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oricosmos.com/privkey.pem;

    return 301 https://oricosmos.com$request_uri;
}

# ── 主门户 oricosmos.com :3100 ─────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oricosmos.com;

    ssl_certificate     /etc/letsencrypt/live/oricosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oricosmos.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }
}

# ── 认证中心 auth.oricosmos.com :3101 ──────────────────────────
# /internal/* 已由应用层 IP 校验保护（仅 127.0.0.1），此处再加一层防御

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.oricosmos.com;

    ssl_certificate     /etc/letsencrypt/live/oricosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oricosmos.com/privkey.pem;

    location /internal/ {
        deny all;
    }

    location / {
        proxy_pass http://127.0.0.1:3101;
        include /etc/nginx/proxy_params;
    }
}

# ── 商城 shop.oricosmos.com :3102 ──────────────────────────────
# POST /api/checkout 为内网结账接口，公网只允许 GET/PUT（前台购买）

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shop.oricosmos.com;

    ssl_certificate     /etc/letsencrypt/live/oricosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oricosmos.com/privkey.pem;

    location = /api/checkout {
        limit_except GET PUT {
            deny all;
        }
        proxy_pass http://127.0.0.1:3102;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:3102;
        include /etc/nginx/proxy_params;
    }
}

# ── 管理后台 admin.oricosmos.com :3103 + CMS /cms/* :3120 ─────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.oricosmos.com;

    ssl_certificate     /etc/letsencrypt/live/oricosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oricosmos.com/privkey.pem;

    # Payload CMS（方案 B：仅经 admin 子路径访问，公网 cms 子域已封禁）
    location /cms/ {
        client_max_body_size 20m;
        proxy_pass http://127.0.0.1:3120/cms/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://127.0.0.1:3103;
        include /etc/nginx/proxy_params;
    }
}

# ── 八字 bazi.oricosmos.com :3110 ──────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bazi.oricosmos.com;

    ssl_certificate     /etc/letsencrypt/live/oricosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oricosmos.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3110;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }
}

# ── 紫微 ziwei.oricosmos.com :3111 ─────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ziwei.oricosmos.com;

    ssl_certificate     /etc/letsencrypt/live/oricosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oricosmos.com/privkey.pem;

    # report-job 运行时写入 HTML；直连磁盘避免 Next 需重启才暴露 public/reports
    location /reports/ {
        alias /opt/orasage/ziwei/public/reports/;
        default_type text/html;
        charset utf-8;
    }

    location / {
        proxy_pass http://127.0.0.1:3111;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }
}

# ── 塔罗 tarot.oricosmos.com :3112 ────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tarot.oricosmos.com;

    ssl_certificate     /etc/letsencrypt/live/oricosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oricosmos.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3112;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }
}

# ── CMS cms.oricosmos.com — 方案 B：重定向至 admin 子路径/运营后台 ─

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cms.oricosmos.com;

    ssl_certificate     /etc/letsencrypt/live/oricosmos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oricosmos.com/privkey.pem;

    # 旧 CMS 书签（/admin、/api、/media）→ admin.oricosmos.com/cms/*
    location ~ ^/(admin|api|media)(/|$) {
        return 301 https://admin.oricosmos.com/cms$request_uri;
    }

    # 根路径 → 运营后台（商品 / 订单 / 用户）
    location / {
        return 301 https://admin.oricosmos.com/;
    }
}
