# OraSage 方案 B — 生产 Nginx 配置
# tarot 暂用 3000（现有服务），其余按规划端口

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name
        orasage.com www.orasage.com
        auth.orasage.com shop.orasage.com admin.orasage.com
        bazi.orasage.com ziwei.orasage.com tarot.orasage.com cms.orasage.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.orasage.com;
    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://orasage.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orasage.com;
    ssl_certificate     /etc/letsencrypt/live/orasage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orasage.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        include /etc/nginx/proxy_params;
    }
}

