# auth.orasage.com — 认证服务
# build 上下文指向仓库根目录的 auth-service/（相对本文件路径 ../../auth-service）
# 启动: docker compose -f deploy/auth/docker-compose.yml up -d（在仓库根目录执行）

services:
  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orasage_auth
      POSTGRES_USER: orasage
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orasage -d orasage_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build: ../../auth-service
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3101:3101"
    environment:
      NODE_ENV: production
      PORT: 3101
      # 容器内必须监听 0.0.0.0，否则 Docker 端口映射无法访问容器；
      # 对外暴露仍由下方 `127.0.0.1:3101:3101` 端口映射限制为仅本机可达。
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://orasage:${DB_PASSWORD:-changeme}@auth-db:5432/orasage_auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_COOKIE_NAME: orasage_token
      JWT_COOKIE_DOMAIN: .orasage.com

volumes:
  auth_pg_data:
