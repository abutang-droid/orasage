services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orasage
      POSTGRES_PASSWORD: orasage
      POSTGRES_DB: orasage_shop
    ports:
      - "5433:5432"
    volumes:
      - shop_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orasage -d orasage_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  shop_pg_data:
