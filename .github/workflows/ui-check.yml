name: UI consistency check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - 'shared/**'
      - 'packages/tokens/**'
      - 'packages/ui/**'
      - 'scripts/tokens/**'
      - 'scripts/app-shell/**'
      - 'package.json'
      - '.github/workflows/ui-check.yml'

jobs:
  ui-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install workspace root
        run: npm install --no-audit --no-fund

      - name: Run ui:check
        run: npm run ui:check
