name: Deploy Ziwei

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: '部署模式 (proxy=迁移代理, native=自托管)'
        required: true
        default: 'proxy'
        type: choice
        options:
          - proxy
          - native
  push:
    branches:
      - cursor/deploy-ziwei-1ddb
      - main
    paths:
      - 'deploy/ziwei/**'
      - '.github/workflows/deploy-ziwei.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'abutang-droid/orasage'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST || '34.75.40.67' }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy ziwei to VPS
        env:
          SSH_KEY: ~/.ssh/deploy_key
          SSH_USER: ${{ secrets.SSH_USER || 'ubuntu' }}
          SSH_HOST: ${{ secrets.SSH_HOST || '34.75.40.67' }}
          DEPLOY_MODE: ${{ github.event.inputs.deploy_mode || 'proxy' }}
          ORASAGE_REF: ${{ github.ref_name }}
          ZIWEI_UPSTREAM_URL: https://api2.lilyfunnlove.com
        run: bash deploy/remote-deploy-ziwei.sh

      - name: Verify deployment
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://ziwei.orasage.com/health)
          echo "ziwei.orasage.com/health → HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::ziwei health check returned HTTP $code"
          fi
          page=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://ziwei.orasage.com)
          echo "ziwei.orasage.com → HTTP $page"
