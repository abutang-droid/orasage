name: Deploy Bazi

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: '部署模式 (proxy=迁移代理, native=自托管)'
        required: true
        default: 'proxy'
        type: choice
        options:
          - proxy
          - native
  push:
    branches:
      - cursor/deploy-bazi-34a4
      - main
    paths:
      - 'deploy/bazi/**'
      - 'deploy/remote-deploy-bazi.sh'
      - '.github/workflows/deploy-bazi.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          KEY1: ${{ secrets.SSH_PRIVATE_KEY }}
          KEY2: ${{ secrets.SSH_KEY }}
          KEY3: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          SSH_PRIVATE_KEY="${KEY1:-${KEY2:-$KEY3}}"
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::未找到 SSH 私钥。请在 Settings → Secrets → Actions 添加 SSH_PRIVATE_KEY（完整 PEM，含 BEGIN/END 行）"
            exit 1
          fi
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! grep -q 'BEGIN.*PRIVATE KEY' ~/.ssh/deploy_key; then
            echo "::error::SSH_PRIVATE_KEY 格式不正确，需包含 -----BEGIN ... PRIVATE KEY-----"
            exit 1
          fi
          ssh-keyscan -H "${{ secrets.SSH_HOST || '34.75.40.67' }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH key loaded ($(wc -c < ~/.ssh/deploy_key) bytes)"

      - name: Test direct SSH connectivity
        id: direct_ssh
        continue-on-error: true
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || '34.75.40.67' }}
          SSH_USER: ${{ secrets.SSH_USER || 'ubuntu' }}
        run: |
          if timeout 25 ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" "echo SSH_OK"; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::直连 SSH 失败，将尝试 GCP IAP（如已配置 GCP_SA_KEY）"
          fi

      - name: Setup GCP IAP tunnel
        if: steps.direct_ssh.outputs.ok != 'true' && secrets.GCP_SA_KEY != ''
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          GCP_ZONE: ${{ secrets.GCP_ZONE }}
          GCP_INSTANCE: ${{ secrets.GCP_INSTANCE }}
        run: |
          if [ -z "$GCP_PROJECT" ] || [ -z "$GCP_ZONE" ] || [ -z "$GCP_INSTANCE" ]; then
            echo "::error::直连 SSH 失败，且 GCP IAP 配置不完整。请添加 GCP_SA_KEY、GCP_PROJECT、GCP_ZONE、GCP_INSTANCE"
            exit 1
          fi
          echo "$GCP_SA_KEY" > /tmp/gcp-sa.json
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-cloud-cli
          gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json
          gcloud config set project "$GCP_PROJECT"
          PROXY_CMD="gcloud compute start-iap-tunnel ${GCP_INSTANCE} 22 --listen-on-stdin --project=${GCP_PROJECT} --zone=${GCP_ZONE}"
          echo "GCP_IAP_PROXY_COMMAND=$PROXY_CMD" >> "$GITHUB_ENV"
          timeout 30 ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=20 \
            -o StrictHostKeyChecking=no \
            -o "ProxyCommand=$PROXY_CMD" \
            "${{ secrets.SSH_USER || 'ubuntu' }}@${{ secrets.SSH_HOST || '34.75.40.67' }}" "echo IAP_SSH_OK"

      - name: Fail if SSH unavailable
        if: steps.direct_ssh.outputs.ok != 'true' && secrets.GCP_SA_KEY == ''
        run: |
          echo "::error::无法 SSH 到 ${{ secrets.SSH_HOST || '34.75.40.67' }}:22"
          echo "::error::请在 GCP 防火墙开放 22 端口，或配置 GCP_SA_KEY + GCP_PROJECT/GCP_ZONE/GCP_INSTANCE 使用 IAP"
          exit 1

      - name: Deploy bazi to VPS
        env:
          SSH_KEY: ~/.ssh/deploy_key
          SSH_USER: ${{ secrets.SSH_USER || 'ubuntu' }}
          SSH_HOST: ${{ secrets.SSH_HOST || '34.75.40.67' }}
          DEPLOY_MODE: ${{ github.event.inputs.deploy_mode || 'proxy' }}
          BAZI_REPO_URL: ${{ secrets.BAZI_REPO_URL }}
          BAZI_UPSTREAM_URL: ${{ secrets.BAZI_UPSTREAM_URL || 'https://api1.lilyfunnlove.com' }}
          ORASAGE_REF: ${{ github.ref_name }}
          GCP_IAP_PROXY_COMMAND: ${{ env.GCP_IAP_PROXY_COMMAND }}
        run: bash deploy/remote-deploy-bazi.sh

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || '34.75.40.67' }}
          SSH_USER: ${{ secrets.SSH_USER || 'ubuntu' }}
          GCP_IAP_PROXY_COMMAND: ${{ env.GCP_IAP_PROXY_COMMAND }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          if [ -n "${GCP_IAP_PROXY_COMMAND:-}" ]; then
            SSH_OPTS="$SSH_OPTS -o ProxyCommand='$GCP_IAP_PROXY_COMMAND'"
          fi
          ssh $SSH_OPTS "${SSH_USER}@${SSH_HOST}" \
            "curl -sf http://127.0.0.1:3110/health && echo && curl -sI https://bazi.orasage.com | head -5"
