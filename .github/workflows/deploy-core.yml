name: Deploy Core Apps (main + auth + shop + admin)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - 'main/**'
      - 'packages/ui/**'
      - 'packages/tokens/**'
      - 'auth-service/**'
      - 'shop/**'
      - 'admin/**'
      - 'shared/**'
      - 'deploy/deploy-shop.sh'
      - 'deploy/deploy-shop-on-vps.sh'
      - 'deploy/nginx/orasage.conf'
      - 'deploy/main/**'
      - 'deploy/auth/**'
      - 'deploy/shop/**'
      - 'deploy/admin/**'
      - '.github/workflows/deploy-core.yml'
      - '.github/actions/setup-vps-ssh/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'abutang-droid/orasage'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup VPS SSH
        uses: ./.github/actions/setup-vps-ssh
        secrets: inherit

      - name: Deploy main + auth + shop + admin on VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || '34.75.40.67' }}
          SSH_USER: ${{ secrets.SSH_USER || 'ubuntu' }}
          BRANCH: ${{ github.ref_name }}
          GCP_IAP_PROXY_COMMAND: ${{ env.GCP_IAP_PROXY_COMMAND }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes"
          if [ -n "${GCP_IAP_PROXY_COMMAND:-}" ]; then
            SSH_OPTS="$SSH_OPTS -o ProxyCommand='$GCP_IAP_PROXY_COMMAND'"
          fi
          ssh $SSH_OPTS "${SSH_USER}@${SSH_HOST}" \
            "sudo chown -R ubuntu:ubuntu /opt/orasage 2>/dev/null || true; \
             cd /opt/orasage && git fetch origin ${BRANCH} && git checkout ${BRANCH} && git reset --hard origin/${BRANCH} && \
             BRANCH=${BRANCH} ORASAGE_REF=${BRANCH} bash deploy/deploy-shop-on-vps.sh"

      - name: Verify deployment
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || '34.75.40.67' }}
          SSH_USER: ${{ secrets.SSH_USER || 'ubuntu' }}
          GCP_IAP_PROXY_COMMAND: ${{ env.GCP_IAP_PROXY_COMMAND }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          if [ -n "${GCP_IAP_PROXY_COMMAND:-}" ]; then
            SSH_OPTS="$SSH_OPTS -o ProxyCommand='$GCP_IAP_PROXY_COMMAND'"
          fi
          ssh $SSH_OPTS "${SSH_USER}@${SSH_HOST}" \
            "curl -sf http://127.0.0.1:3101/health && echo && curl -sI https://orasage.com | head -5 && curl -sI https://shop.orasage.com | head -5"
